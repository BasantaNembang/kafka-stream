spring:
  application:
    name: StreamKafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.kafka.serdes.TransactionSerializer
    streams:
      application-id: StreamKafka-Id
      properties:
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        default.value.serde: com.kafka.serdes.TransactionSerdes

      state-dir: D:\Stream-DB

        